<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h3>Employee Directory</h3>
    <p>Add Employee</p>
    <hr>

    <form method="POST" th:action="@{/employees/save}" th:object="${employee}">
        <input type="hidden" th:field="*{id}" />
        <div class="form-group mb-4 w-25">
            <input type="text" class="form-control" th:field="*{firstName}" placeholder="First Name" />
        </div>
        <div class="form-group mb-4 w-25">
            <input type="text" class="form-control" th:field="*{lastName}" placeholder="Last Name" />
        </div>
        <div class="form-group mb-4 w-25">
            <input type="email" class="form-control" th:field="*{email}" placeholder="Email" />
        </div>
        <button type="submit" class="btn btn-info col-2">Save</button>
    </form>

    <hr>

    <a th:href="@{/employees/list}">Back to Employees List</a>
</div>

</body>
</html>
