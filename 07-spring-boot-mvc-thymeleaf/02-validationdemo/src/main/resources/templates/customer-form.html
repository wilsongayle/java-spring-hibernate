<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Form</title>
    <link rel="stylesheet" th:href="@{styles.css}" />
</head>
<body>
    <h3>Customer Form</h3>
    <form th:action="@{/processCustomerForm}" method="POST" th:object="${customer}">
        <div>First name: <input type="text" th:field="*{firstName}" /></div>
        <div>
            Last name* (required): <input type="text" th:field="*{lastName}" />
            <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error"></span>
        </div>


        <div><input type="submit" value="Submit" /></div>
    </form>
</body>
</html>
